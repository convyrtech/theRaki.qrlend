<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test — The Raki Smart App Banner v5</title>

    <!-- Force-show banner for testing (no mobile/Safari/localStorage checks) -->
    <script>
    (function(){
      var LINK='https://app.theraki.ru';
      var ICON='https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/48/cb/b8/48cbb880-81f8-6539-3b27-f2264b8e4d1c/appIcon-0-0-1x_U007ephone-0-1-0-85-220.png/100x100bb.jpg';

      function go(){
        var s=document.createElement('style');
        s.textContent=[
          '.trb{position:fixed;top:0;left:0;right:0;z-index:999999;',
          'background:#fff;border-top:3px solid #51a8af;box-shadow:0 1px 8px rgba(0,0,0,.12);',
          'padding:8px 10px 8px 6px;display:flex;align-items:center;gap:6px;',
          'font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Roboto,sans-serif;',
          'animation:trb-in .3s ease-out}',

          '.trb-cl{position:relative;background:none;border:none;color:#c4c4c4;font-size:18px;',
          'padding:4px;cursor:pointer;flex-shrink:0;line-height:1;',
          '-webkit-tap-highlight-color:transparent}',
          '.trb-cl::after{content:"";position:absolute;inset:-10px -6px -10px -8px}',

          '.trb-lnk{display:flex;align-items:center;gap:10px;flex:1;min-width:0;',
          'text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}',
          '.trb-lnk:active{opacity:.92}',

          '.trb-ic{width:44px;height:44px;border-radius:10px;flex-shrink:0;',
          'object-fit:cover;box-shadow:0 0 0 .5px rgba(0,0,0,.1);background:#f0f0f0}',

          '.trb-info{flex:1;min-width:0}',
          '.trb-name{font-size:13px;font-weight:600;color:#1d1d1f;line-height:1.2;',
          'overflow:hidden;text-overflow:ellipsis;white-space:nowrap}',
          '.trb-stars{margin-top:1px;font-size:11px;letter-spacing:1px;color:#F5A623}',
          '.trb-cat{font-size:11px;color:#8e8e93;margin-top:0;line-height:1.3}',

          '.trb-btn{background:#51a8af;color:#fff;',
          'padding:6px 18px;border-radius:14px;font-size:13px;font-weight:600;',
          'flex-shrink:0;letter-spacing:.1px;transition:opacity .15s}',
          '.trb-lnk:active .trb-btn{opacity:.85}',

          '@keyframes trb-in{from{transform:translateY(-100%)}to{transform:translateY(0)}}'
        ].join('');
        document.head.appendChild(s);

        var sp=document.createElement('div');
        var b=document.createElement('div');b.className='trb';
        b.innerHTML='<button class="trb-cl" id="trbX" aria-label="\u0417\u0430\u043a\u0440\u044b\u0442\u044c">\u00d7</button>'
          +'<a class="trb-lnk" href="'+LINK+'">'
          +'<img class="trb-ic" src="'+ICON+'" alt="The Raki">'
          +'<div class="trb-info">'
          +'<div class="trb-name">The Raki Delivery</div>'
          +'<div class="trb-stars">\u2605\u2605\u2605\u2605\u2605</div>'
          +'<div class="trb-cat">\u0423\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u043f\u0440\u0438\u043b\u043e\u0436\u0435\u043d\u0438\u0435</div>'
          +'</div>'
          +'<span class="trb-btn">\u0423\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c</span>'
          +'</a>';

        document.body.insertBefore(sp,document.body.firstChild);
        document.body.insertBefore(b,document.body.firstChild);
        sp.style.height=b.offsetHeight+'px';

        document.getElementById('trbX').onclick=function(e){
          e.stopPropagation();
          b.style.transform='translateY(-100%)';
          b.style.transition='transform .25s ease-in';
          sp.style.transition='height .25s ease-in';
          sp.style.height='0';
          setTimeout(function(){b.remove();sp.remove()},300);
        };
      }
      if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',go);else go();
    })();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Oswald', -apple-system, sans-serif;
            background: #0b3237;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .header {
            background: #51a8af;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-logo {
            height: 48px;
            filter: brightness(0) invert(1);
        }
        .header-burger {
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-burger svg {
            width: 20px;
            height: 20px;
            fill: #51a8af;
        }
        .hero {
            position: relative;
            min-height: calc(100vh - 76px);
            background: url('https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=800&q=70') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 24px 80px;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                rgba(11,50,55,0.15) 0%,
                rgba(11,50,55,0.3) 40%,
                rgba(11,50,55,0.45) 100%);
        }
        .hero > * { position: relative; z-index: 1; }
        .hero .tagline {
            font-size: 18px;
            font-weight: 200;
            color: rgba(255,255,255,0.85);
        }
        .hero h1 {
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1.2;
            margin-top: 14px;
        }
        .hero .divider {
            width: 60%;
            height: 1px;
            background: rgba(255,255,255,0.35);
            margin: 20px 0;
        }
        .hero .sub {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
        }
        .hero .cta {
            display: inline-block;
            margin-top: 24px;
            background: #51a8af;
            color: #fff;
            padding: 14px 36px;
            border-radius: 4px;
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }
        .hero .socials {
            position: absolute;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 1;
        }
        .hero .socials a {
            color: rgba(255,255,255,0.8);
            font-size: 28px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <img class="header-logo" src="https://static.tildacdn.com/tild6166-6463-4438-a531-663435656263/logo.png" alt="The Raki">
        <div class="header-burger">
            <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
        </div>
    </div>
    <div class="hero">
        <div class="tagline">Вкусности для гурманов...</div>
        <h1>Раковарня на дом премиум класса в любую точку Москвы и МО ...</h1>
        <div class="divider"></div>
        <div class="sub">
            Скачивай приложение THE RAKI<br>
            Пользуйся индивидуальной системой лояльности
        </div>
        <a class="cta" href="#">ЗАКАЗАТЬ</a>
        <div class="socials">
            <a href="#">&#9992;</a>
            <a href="#">&#9678;</a>
            <a href="#">&#9403;</a>
        </div>
    </div>
</body>
</html>
